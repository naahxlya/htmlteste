<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Juros Compostos</title>
  <link rel="stylesheet" href="/public/style/style.css" />
</head>
<body>
  
  <div class="top-buttons">
    <a href="simples.html">Juros Simples</a>
    <a href="relatorio.html">Ver Relatório</a>
  </div>

  <main class="container">
    
    <h1 class="label" id="boasVindas"></h1>
    <br>
    <h1>Calculadora de Juros Compostos</h1>

    <form id="form">
      <div class="input-group">
        <label>Capital Inicial (R$)</label>
        <input type="number" id="capital" required />
      </div>

      <div class="input-group">
        <label>Taxa de Juros (% ao mês)</label>
        <input type="number" id="taxa" step="0.01" required />
      </div>

      <div class="input-group">
        <label>Tempo (meses)</label>
        <input type="number" id="tempo" required />
      </div>

      <section class="resultado" id="resultado">
        <p>Preencha os dados para calcular.</p>
      </section>

      <button type="submit">Calcular</button>
    </form>

    <button class="btn-aporte" onclick="irParaAporte()">
      Simular com Aporte Mensal
    </button>

    <div class="input-group">
      <button onclick="sair()" class="btn-sair">Sair</button>
    </div>
    
  </main>

  <script src="/public/script/script.js"></script>
</body>
</html>

<script>
const usuario = localStorage.getItem("usuario");

if (!usuario) {
  window.location.href = "login.html";
} else {
  document.getElementById("boasVindas").textContent =
    "Seja bem-vindo, " + usuario + "!";
}
</script>
